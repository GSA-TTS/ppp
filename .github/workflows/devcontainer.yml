# Build the ppp dev container and push it to GHCR (ticket #15 / T2).
#
# Developers PULL this prebuilt, multi-arch image (see .devcontainer/README.md)
# rather than building locally. The build fetches the private universal
# behavioral contract at build time via a BuildKit --secret (PLAYBOOK_TOKEN),
# exactly as .devcontainer/Dockerfile expects; the token is never baked into a
# layer. The final multi-arch digest is emitted in the job summary so
# devcontainer.json can be pinned by digest.
#
# IMPORTANT: each architecture is built on its OWN NATIVE runner (amd64 on
# ubuntu-latest, arm64 on ubuntu-24.04-arm) and the results are merged into one
# manifest. We do NOT use QEMU emulation — emulating an arm64 build of this
# image (Homebrew bootstrap, go-tool compiles, mitmproxy install) on an amd64
# runner takes the better part of an hour; native arm64 runs in minutes.
name: Dev Container Image

on:
  push:
    branches: [main]
    paths:
      - ".devcontainer/**"
      - ".github/workflows/devcontainer.yml"
  workflow_dispatch:

concurrency:
  group: devcontainer-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/gsa-tts/ppp-devcontainer

permissions:
  contents: read
  packages: write

jobs:
  # 1) Build each arch on its native runner and push BY DIGEST (no tag yet).
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Fail fast with a clear message if the contract secret is missing — the
      # Dockerfile's contract step also fails closed, but this is friendlier.
      - name: Ensure PLAYBOOK_TOKEN is configured
        env:
          PLAYBOOK_TOKEN: ${{ secrets.PLAYBOOK_TOKEN }}
        run: |
          if [ -z "$PLAYBOOK_TOKEN" ]; then
            echo "::error::PLAYBOOK_TOKEN secret is not set. Add a token with read access to the private GSA-TTS/agentic-coding-playbook repo (Settings → Secrets and variables → Actions)." >&2
            exit 1
          fi

      - name: Build & push by digest (${{ matrix.platform }})
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/Dockerfile
          platforms: ${{ matrix.platform }}
          # Push by digest only; the tag/manifest is assembled in the merge job.
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          secrets: |
            playbook_token=${{ secrets.PLAYBOOK_TOKEN }}
          provenance: false
          cache-from: type=gha,scope=devcontainer-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=devcontainer-${{ matrix.arch }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # 2) Merge the per-arch digests into a single multi-arch manifest + tag it.
  merge:
    name: Merge & tag multi-arch manifest
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 15
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long

      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "${IMAGE}@sha256:%s " *)

      - name: Emit pushed digest
        run: |
          digest="$(docker buildx imagetools inspect "${IMAGE}:${{ steps.meta.outputs.version }}" --format '{{json .Manifest.Digest}}' | tr -d '"')"
          {
            echo "### ppp dev container pushed"
            echo ""
            echo "- **Image:** \`${IMAGE}\`"
            echo "- **Digest:** \`${digest}\`"
            echo "- **Tags:** \`${{ steps.meta.outputs.tags }}\`"
            echo ""
            echo "Pin \`.devcontainer/devcontainer.json\` to:"
            echo ""
            echo '```jsonc'
            echo "\"image\": \"${IMAGE}@${digest}\""
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
