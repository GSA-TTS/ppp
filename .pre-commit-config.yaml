# Universal behavioral contract prerequisite (fail-closed).
# Blocks the commit if the universal Federal AI Agent Behavioral Contract is
# not available. Uses the self-contained probe copied into this project
# (scripts/ensure-contract.py) — no playbook-validator install required.
repos:
  - repo: local
    hooks:
      - id: ensure-contract
        name: Ensure universal behavioral contract is available
        entry: python3 scripts/ensure-contract.py --root .
        language: system
        pass_filenames: false
        always_run: true

  # Secrets scan (fail-closed). Honors .gitleaks.toml, which extends the default
  # ruleset and narrowly allowlists one non-secret test fixture. gitleaks is
  # preinstalled in the dev container (pinned 8.30.1) and available on the host.
  - repo: local
    hooks:
      - id: gitleaks
        name: Detect hardcoded secrets (gitleaks)
        entry: gitleaks protect --staged --redact --config .gitleaks.toml
        language: system
        pass_filenames: false
        always_run: true

